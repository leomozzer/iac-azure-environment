name: "Terraform Plan"
description: "Init with backend config, plan, and upload plan artifact to Azure Blob"

inputs:
  working-dir:
    description: "Path to the Terraform root module"
    required: true
  azure-client-id:
    required: true
  azure-tenant-id:
    required: true
  azure-subscription-id:
    required: true
  resource-group-name:
    description: "Resource group of the backend storage account"
    required: true
  storage-account-name:
    description: "Backend storage account name"
    required: true
  container-name:
    description: "Container for state files"
    required: false
    default: "tfstate"
  state-key:
    description: "State file blob key (e.g. prod.tfstate)"
    required: true
  stage:
    description: "Deployment stage (dev/test/prod)"
    required: true
  terraform-version:
    required: false
    default: "1.15.5"

outputs:
  plan-text:
    description: "Human-readable plan output"
    value: ${{ steps.show-plan.outputs.plan_text }}

runs:
  using: composite
  steps:
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform-version }}
        terraform_wrapper: false

    - name: Terraform Init
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      env:
        ARM_USE_OIDC: "true"
      run: |
        terraform init \
          -backend-config="resource_group_name=${{ inputs.resource-group-name }}" \
          -backend-config="storage_account_name=${{ inputs.storage-account-name }}" \
          -backend-config="container_name=${{ inputs.container-name }}" \
          -backend-config="key=${{ inputs.state-key }}" \
          -reconfigure

    - name: Remove stale azapi VNet state entries
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      env:
        ARM_USE_OIDC: "true"
      run: |
        for addr in \
          'module.vnet_hub.azapi_resource.vnet' \
          'module.vnet_application.azapi_resource.vnet' \
          'module.vnet_avd.azapi_resource.vnet'; do
          if terraform state list "$addr" 2>/dev/null | grep -q "$addr"; then
            terraform state rm "$addr"
          fi
        done

    - name: Download tfvars from Azure Blob
      uses: azure/cli@v2
      with:
        inlineScript: |
          az storage blob download \
            --account-name "${{ inputs.storage-account-name }}" \
            --container-name "tfvars" \
            --name "${{ inputs.stage }}.tfvars" \
            --file "${{ inputs.working-dir }}/${{ inputs.stage }}.tfvars" \
            --auth-mode login \
            --no-progress || true

    - name: Terraform Plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-dir }}
      env:
        ARM_USE_OIDC: "true"
      run: |
        VAR_FILE_FLAG=""
        if [ -f "${{ inputs.stage }}.tfvars" ]; then
          VAR_FILE_FLAG="-var-file=${{ inputs.stage }}.tfvars"
        fi
        terraform plan -out="${{ inputs.stage }}.tfplan" -lock-timeout=10m $VAR_FILE_FLAG

    # - name: Capture Plan Text
    #   id: show-plan
    #   shell: bash
    #   working-directory: ${{ inputs.working-dir }}
    #   run: |
    #     PLAN_TEXT=$(terraform show -no-color "${{ inputs.stage }}.tfplan")
    #     echo "plan_text<<EOF_PLAN" >> $GITHUB_OUTPUT
    #     echo "$PLAN_TEXT" >> $GITHUB_OUTPUT
    #     echo "EOF_PLAN" >> $GITHUB_OUTPUT

    - name: Archive working directory with plan
      uses: a7ul/tar-action@v1.1.3
      with:
        command: c
        cwd: ${{ inputs.working-dir }}
        files: |
          ./
        outPath: plan-${{ inputs.stage }}-${{ github.run_number }}.tar.gz

    - name: Upload plan archive to Azure Blob
      uses: azure/cli@v2
      with:
        inlineScript: |
          az storage blob upload \
            --account-name "${{ inputs.storage-account-name }}" \
            --container-name "plans" \
            --file "plan-${{ inputs.stage }}-${{ github.run_number }}.tar.gz" \
            --name "plan-${{ inputs.stage }}-${{ github.run_number }}.tar.gz" \
            --auth-mode login \
            --overwrite
